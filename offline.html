<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - ISR Inventory</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    body {
      background: linear-gradient(135deg, #00102c, #001f4e);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', system-ui, sans-serif;
    }
    .offline-card {
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(10px);
      border-radius: 28px;
      padding: 2rem;
      text-align: center;
      max-width: 320px;
      margin: 1rem;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    }
    .offline-card i {
      font-size: 4rem;
      color: #fb5201;
    }
    h3 { margin: 1rem 0 0.5rem; color: #00102c; }
    p { color: #64748b; }
    .btn-primary { background: #fb5201; border: none; border-radius: 40px; padding: 10px 20px; }
    .btn-primary:hover { background: #d94501; }
  </style>
</head>
<body>
  <div class="offline-card">
    <i class="bi bi-wifi-off"></i>
    <h3>Anda sedang offline</h3>
    <p>Periksa koneksi internet Anda untuk mengakses data terbaru.</p>
    <button class="btn btn-primary mt-2" onclick="location.reload()">
      <i class="bi bi-arrow-repeat"></i> Coba lagi
    </button>
  </div>
</body>
</html>
