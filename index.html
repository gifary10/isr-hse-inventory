<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>ISR Inventory</title>
    <!-- PWA Meta -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00102c">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Google Fonts - Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Loading Overlay -->
    <div id="loadingOverlay">
        <div class="logo-overlay">
            <img src="isr.png" alt="ISR Inventory Logo">
        </div>
        <div class="spinner-border spinner" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
        <p>ISR Inventory System</p>
    </div>

    <!-- Header -->
    <header class="app-header">
        <button class="btn-back" id="backButton" style="display: none;">
            <i class="bi bi-arrow-left"></i>
        </button>
        <img src="isr.png" alt="Logo" class="header-logo-img">
        <span class="header-title" id="pageTitle">Dashboard</span>
    </header>

    <!-- Main Content -->
    <main class="main-content" id="mainContent">
        <!-- Dynamic content loaded here -->
    </main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <div class="nav-item" data-page="dashboard">
            <i class="bi bi-speedometer2"></i>
            <span>Dashboard</span>
        </div>
        <div class="nav-item" data-page="items">
            <i class="bi bi-box-seam"></i>
            <span>Item</span>
        </div>
        <div class="nav-item" data-page="opname">
            <i class="bi bi-clipboard-check"></i>
            <span>Opname</span>
        </div>
        <div class="nav-item" data-page="distribution">
            <i class="bi bi-truck"></i>
            <span>Distribusi</span>
        </div>
        <div class="nav-item" data-page="history">
            <i class="bi bi-clock-history"></i>
            <span>History</span>
        </div>
    </nav>

    <!-- FAB -->
    <button class="fab-main" id="fabButton" style="display: none;">
        <i class="bi bi-plus-lg"></i>
    </button>

    <!-- Toast Container -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index: 9998;">
        <div id="liveToast" class="toast" role="alert" aria-live="assertive" aria-atomic="true" data-bs-autohide="true" data-bs-delay="3000">
            <div class="d-flex">
                <div class="toast-body"></div>
                <button type="button" class="btn-close me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>
        </div>
    </div>

    <!-- Signature Modal -->
    <div class="modal fade" id="signatureModal" tabindex="-1" data-bs-backdrop="static">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header bg-primary-dark text-white">
                    <h5 class="modal-title">Digital Signature</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p class="text-muted small mb-2">Tanda tangan di bawah ini sebagai bukti validasi:</p>
                    <canvas id="signatureCanvas" class="signature-canvas" width="400" height="150" style="width:100%; height:150px; touch-action:none;"></canvas>
                    <div class="d-flex justify-content-between mt-2">
                        <button class="btn btn-sm btn-clear-sign" id="clearSignature">
                            <i class="bi bi-eraser"></i> Hapus
                        </button>
                        <small class="text-muted">Tap/tarik untuk menandatangani</small>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Batal</button>
                    <button type="button" class="btn btn-primary" id="confirmSignatureBtn">Konfirmasi & Kirim</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.7/dist/signature_pad.umd.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <script type="module" src="main.js?v=2"></script>
</body>
</html>
